<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Expo Booth Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Expo Booth Manager</h1>

<div id="menu">

<button id="zoomIn">Zoom +</button>
<button id="zoomOut">Zoom -</button>
<span id="zoomLevel">100%</span>

<button id="exportBtn">Export Excel</button>
<button id="uploadBtn">Import Excel</button>

<input type="file" id="importFile" hidden>

</div>

<div id="floorContainer">
<div id="floor"></div>
</div>

<!-- Modal -->

<div id="boothModal" class="modal">

<div class="modalContent">

<h3>Booth <span id="boothId"></span></h3>

<label>Status</label>
<select id="boothStatus">
<option value="available">Available</option>
<option value="booked">Booked</option>
</select>

<label>Exhibitor</label>
<input id="boothName">

<button id="saveBoothBtn">Save</button>
<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
</script>

<!-- Excel -->

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="script.js"></script>

</body>
</html>
