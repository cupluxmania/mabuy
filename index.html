<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Expo Floorplan</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<header>
  Int'l Hospital Expo @ ICE BSD 2026
</header>

<div class="container">

  <!-- SEARCH -->
  <input type="text" id="searchBox" placeholder="🔍 Search booth or exhibitor...">

  <!-- LEGEND -->
  <div id="legend">
    <div><span class="dot available"></span> Available</div>
    <div><span class="dot booked"></span> Booked</div>
  </div>

  <!-- MENU -->
  <div id="menu">
    <button id="filledBoothsBtn">Filled Booths</button>
    <button id="analyticsBtn">Analytics</button>
    <button id="zoomIn">＋</button>
    <button id="zoomOut">－</button>
    <span id="zoomLevel">100%</span>
  </div>

  <!-- FLOOR -->
  <div id="floorContainer">
    <div id="floor"></div>
  </div>

</div>

<!-- SIDE PANEL -->
<div id="sidePanel">
  <h3>Booth Info</h3>
  <div id="panelContent">Click a booth</div>
</div>

<script src="script.js"></script>
</body>
</html>
