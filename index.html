<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Expo Floorplan</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<h1>Int'l Hospital Expo @ICE BSD 2026</h1>

<div id="legend">

<div class="legendItem">
<span class="legendColor available"></span>
Available
</div>

<div class="legendItem">
<span class="legendColor booked"></span>
Booked
</div>

</div>

<div id="menu">

<button class="menuBtn" id="filledBoothsBtn">Filled Booths</button>

<button class="menuBtn" id="analyticsBtn">Analytics</button>

<button class="menuBtn" id="exportBtn">Export</button>

<button class="menuBtn" id="zoomIn">Zoom In +</button>

<button class="menuBtn" id="zoomOut">Zoom Out -</button>

<span id="zoomLevel">100%</span>

</div>

<div id="filledPanel" class="panel"></div>

<div id="analyticsPanel" class="panel"></div>

<div id="floorContainer">

<div id="floor"></div>

</div>

<div id="boothModal" class="modal">

<div class="modal-content">

<h3>Edit Booth</h3>

<p>Booth ID: <span id="boothId"></span></p>

<label for="boothStatus">Status</label>

<select id="boothStatus">

<option value="available">Available</option>
<option value="booked">Booked</option>

</select>

<label for="boothName">Exhibitor Name</label>

<input type="text" id="boothName">

<label for="contractorName">Contractor Name</label>

<input type="text" id="contractorName">

<div class="modalButtons">

<button id="saveBoothBtn" type="button">Save</button>

<button type="button" onclick="closeModal()">Cancel</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
