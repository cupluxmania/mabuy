<!DOCTYPE html>
<html>
<head>
<title>Hospital Expo Floorplan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Int'l Hospital Expo @ICE-BSD 2026</h1>

<!-- Legend -->
<div id="legend">
  <div class="legendItem"><span class="legendColor available"></span> Available</div>
  <div class="legendItem"><span class="legendColor booked"></span> Booked</div>
</div>

<!-- Menu -->
<div id="menu">
  <button class="menuBtn" id="zoomIn">Zoom In +</button>
  <button class="menuBtn" id="zoomOut">Zoom Out -</button>
  <span id="zoomLevel">100%</span>
  <button class="menuBtn" id="filledBoothsBtn">Filled Booths</button>
  <button class="menuBtn" id="analyticsBtn">Analytics</button>
  <button class="menuBtn" id="uploadBtn">Upload</button>
  <button class="menuBtn" id="exportBtn">Export</button>
  <input type="file" id="importFile" style="display:none;">
</div>

<!-- Floorplan container -->
<div id="floorContainer">
  <div id="floor"></div>
</div>

<!-- Booth Edit Modal -->
<div id="boothModal" class="modal">
  <div class="modal-content">
    <h3>Edit Booth</h3>
    <p>Booth ID: <span id="boothId"></span></p>
    <label>Status:</label>
    <select id="boothStatus">
      <option value="available">Available</option>
      <option value="booked">Booked</option>
    </select>
    <label>Exhibitor Name:</label>
    <input type="text" id="boothName" placeholder="Enter exhibitor name">
    <label>Contractor Name (optional):</label>
    <input type="text" id="contractorName" placeholder="Enter contractor name">
    <div style="margin-top:10px;">
      <button onclick="saveBooth()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Filled Booths & Analytics Panels -->
<div id="filledPanel"></div>
<div id="analyticsPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>
</body>
</html>
