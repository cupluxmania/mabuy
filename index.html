<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Expo Floorplan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Int'l Hospital Expo @ ICE BSD 2026</header>

<div class="container">

    <!-- SEARCH -->
    <div class="searchWrapper">
        <input type="text" id="searchBox" placeholder="🔍 Click to see all exhibitors or search..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <!-- LEGEND -->
    <div id="legend">
        <div><span class="dot available"></span> Available</div>
        <div><span class="dot booked"></span> Booked</div>
        <div><span class="dot plotting"></span> Plotting</div>
    </div>

    <!-- MENU -->
    <div id="menu">
        <button id="analyticsBtn">📊 Analytics</button>
        <button id="zoomIn">+</button>
        <button id="zoomOut">−</button>
        <span id="zoomLevel">100%</span>
    </div>

    <!-- FLOOR -->
    <div id="floorContainer">
        <div id="floor"></div>
    </div>

</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="hidden">
    <h3>Booth Info</h3>
    <div id="panelContent"></div>
</div>

<!-- MINI MAP -->
<div id="miniMap"></div>

<script src="script.js"></script>
</body>
</html>
